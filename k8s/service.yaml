apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: simple-webapp

spec:
  destination:
    namespace: default
    server: https://kubernetes.default.svc

  source:
    repoURL: https://github.com/RAMSHANKARMCA08/simple-webapp.git
    targetRevision: main
    path: k8s

  project: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true