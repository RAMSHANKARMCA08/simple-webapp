apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-webapp

spec:
  replicas: 1

  selector:
    matchLabels:
      app: simple-webapp

  template:
    metadata:
      labels:
        app: simple-webapp

    spec:
      containers:
      - name: web
        image: a2zram/simple-webapp:56c3a40eb9fbed511f54d9343f15bf3d99b086d7
        ports:
        - containerPort: 80