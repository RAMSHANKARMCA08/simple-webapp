apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-webapp

spec:
  replicas: 1

  selector:
    matchLabels:
      app: simple-webapp

  template:
    metadata:
      labels:
        app: simple-webapp

    spec:
      containers:
      - name: web
        image: a2zram/simple-webapp:1.0 
        ports:
        - containerPort: 80