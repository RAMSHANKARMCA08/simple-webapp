name: Build Scan Push

on:
  push:
    branches:
      - master
    paths:
      - 'docker/Dockerfile'
  workflow_dispatch:
  
permissions:
  contents: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

#      - name: Run Trivy filesystem scan
#        uses: aquasec/trivy@0.71.2
#        with:
#          scan-type: fs
#          scan-ref: .
#          severity: HIGH,CRITICAL
#          exit-code: '1'

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set image tag
        run: |
          echo "IMAGE_TAG=$(date +'%Y%m%d')_${{ github.run_number }}" >> $GITHUB_ENV
          
      - name: Build Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/simple-webapp:${IMAGE_TAG} .

#      - name: Scan Docker Image
#        uses: aquasec/trivy@0.71.2
#        with:
#          image-ref: ${{ secrets.DOCKER_USERNAME }}/simple-webapp:${{ github.sha }}
#          severity: HIGH,CRITICAL
#          exit-code: '1'

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/simple-webapp:${IMAGE_TAG}

      - name: Update Deployment Image
        run: |
          sed -i "s|image:.*|image: ${{ secrets.DOCKER_USERNAME }}/simple-webapp:${IMAGE_TAG} |" k8s/deployment.yaml

      - name: Commit Manifest
        run: |
          git config --global user.name github-actions
          git config --global user.email github-actions@github.com
          git add k8s/deployment.yaml
          git commit -m "Update image"
          git push
