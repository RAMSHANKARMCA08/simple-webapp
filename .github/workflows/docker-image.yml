name: Docker Image Scan & Push

on:
  push:
    branches:
      - master
    paths:
      - Dockerfile
      - k8s/**
  workflow_dispatch:

permissions:
  contents: write

jobs:

  opa:
    uses: ./.github/workflows/opa.yml
    with:
      manifest: k8s/deployment.yaml

  docker:
    needs: opa
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set Image Tag
        id: image
        run: |
          TAG=$(date +'%Y%m%d')_${{ github.run_number }}
          IMAGE=${{ secrets.DOCKER_USERNAME }}/simple-webapp:$TAG

          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Build Image
        run: |
          docker build -t ${{ steps.image.outputs.image }} .

      - name: Push Image
        run: |
          docker push ${{ steps.image.outputs.image }}

      - name: Update Deployment
        run: |
          sed -i "s|image:.*|image: ${{ steps.image.outputs.image }}|" k8s/deployment.yaml

      - name: Commit Manifest
        run: |
          git config --global user.name github-actions
          git config --global user.email github-actions@github.com
          git add k8s/deployment.yaml
          git diff --cached --quiet || git commit -m "Update Deployment.yaml ${{ steps.image.outputs.image }}"
          git push

  trivy:
    needs: docker
    uses: ./.github/workflows/trivy.yml
    with:
      image: ${{ needs.docker.outputs.image }}
    secrets: inherit