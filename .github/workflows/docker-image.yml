name: Docker Build & Push

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:

  opa:
    uses: ./.github/workflows/opa.yml
    with:
      manifest: k8s/deployment.yaml

  build:
    needs: opa
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set Image Tag
        run: |
          echo "IMAGE_TAG=$(date +'%Y%m%d')_${{ github.run_number }}" >> $GITHUB_ENV

      - name: Build Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/simple-webapp:${IMAGE_TAG} .

      - name: Save Image
        run: |
          docker save \
            -o image.tar \
            ${{ secrets.DOCKER_USERNAME }}/simple-webapp:${IMAGE_TAG}

      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar

  trivy:
    needs: build
    uses: ./.github/workflows/trivy.yml
    with:
      image: ${{ secrets.DOCKER_USERNAME }}/simple-webapp:${{ github.run_number }}

  push:
    needs: trivy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: docker-image

      - run: docker load -i image.tar

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - run: docker push ${{ secrets.DOCKER_USERNAME }}/simple-webapp:${IMAGE_TAG}