name: OPA Policy Check

on:
  workflow_call:
    inputs:
      manifest:
        required: true
        type: string
      policy-path:
        required: false
        default: policy
        type: string

jobs:
  opa:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Conftest
        run: |
          wget -qO conftest.tar.gz https://github.com/open-policy-agent/conftest/releases/download/v0.68.2/conftest_0.68.2_Darwin_x86_64.tar.gz
          tar -xzf conftest.tar.gz
          sudo mv conftest /usr/local/bin/

      - name: Run Policy Validation
        run: |
          conftest test \
            ${{ inputs.manifest }} \
            --policy ${{ inputs.policy-path }}