name: Kubernetes Deployment

on:
  push:
    branches:
      - master
    paths:
      - 'k8s/*.yaml'
  workflow_dispatch:
  
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate Kubernetes Manifest
        run: |
          kubectl apply --dry-run=client -f k8s/

      - name: Deployment Manifest Updated
        run: |
          echo "Kubernetes manifest updated."
          echo "Argo CD will detect this Git change and deploy automatically."